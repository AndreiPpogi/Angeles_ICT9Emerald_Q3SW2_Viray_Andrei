<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3 Seatwork 2</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-image: url("https://images.unsplash.com/photo-1603484477859-abe6a73f9366");
            background-size: cover;
            background-position: center;
            font-family: Arial, sans-serif;
            color:white;
            text-align:center;
        }

        .overlay{
            background: rgba(0,0,0,0.6);
            padding:40px;
            border-radius:15px;
            margin-top:80px;
        }

        input{
            text-align:center;
        }

        footer{
            margin-top:40px;
            font-size:14px;
        }
    </style>
</head>

<body>

<div class="container overlay">

    <h1>Product Locator</h1>
    <h2>Find a Gaming Laptop</h2>

    <p>Enter your budget and click the button to see which laptop brand we recommend.</p>

    <input type="number" id="budget" class="form-control mb-3" placeholder="Enter your budget">

    <button class="btn btn-primary" onclick="findLaptop()">Find Laptop</button>

    <h3 class="mt-4" id="result"></h3>

    <p>
        Laptop brands reference:
        <a href="https://www.asus.com" target="_blank">ASUS Official Website</a>
    </p>

</div>

<footer>
    <p>© Andrei Viray</p>
</footer>

<script>

    function findLaptop(){

        let budget = document.getElementById("budget").value;

        if(budget >= 100000){
            document.getElementById("result").innerHTML = "Recommended Brand: Alienware";
        }
        else if(budget >= 70000){
            document.getElementById("result").innerHTML = "Recommended Brand: ASUS ROG";
        }
        else if(budget >= 50000){
            document.getElementById("result").innerHTML = "Recommended Brand: Acer Nitro";
        }
        else if(budget > 0){
            document.getElementById("result").innerHTML = "Recommended Brand: Lenovo IdeaPad Gaming";
        }
        else{
            document.getElementById("result").innerHTML = "Please enter a valid budget.";
        }

    }

</script>

</body>
</html>
